services:
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: fastapi-standard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fastapi_standard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
